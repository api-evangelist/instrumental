aid: instrumental
name: Instrumental
description: >-
  Instrumental is a platform for manufacturing intelligence that helps companies
  detect and prevent product failures during the manufacturing process. The
  Instrumental API enables programmatic access to retrieve unit and inspection
  test data and metadata from Instrumental projects.
